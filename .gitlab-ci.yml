stages:
  - test
  - build
  - deploy

default:
  interruptible: true

variables:
  UV_CACHE_DIR: .uv-cache

cache:
  paths:
    - .uv-cache/

lint:
  stage: test
  image: python:3.14-slim
  before_script:
    - python -m pip install --upgrade pip uv
    - uv sync --extra dev
  script:
    - make lint

pytest:
  stage: test
  image: python:3.14-slim
  before_script:
    - python -m pip install --upgrade pip uv
    - uv sync --extra dev
  script:
    - make test

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker build --pull -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'

deploy-production:
  stage: deploy
  image: alpine:3.20
  needs:
    - build-image
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
    - printf '%s\n' "$DEPLOY_ENV_FILE" > deploy.env
  script:
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
    - scp compose.yaml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/compose.yaml"
    - scp deploy.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
    - >
      ssh "$DEPLOY_USER@$DEPLOY_HOST"
      "cd '$DEPLOY_PATH'
      && export YUQA_IMAGE='$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA'
      && docker login '$CI_REGISTRY' -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD'
      && docker compose pull bot
      && docker compose up -d --wait bot"
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $DEPLOY_HOST != ""'
